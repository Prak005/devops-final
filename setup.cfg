[nosetests]
verbosity=2
with-coverage=1
cover-package=.
cover-erase=1

[coverage:run]
branch = True
source = .

[coverage:report]
show_missing = True
skip_covered = False

[flake8]
max-line-length = 88
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    build,
    dist

[pylint]
max-line-length = 88
disable =
    C0114,
    C0115,
    C0116